databases:
  - name: reportly-db
    plan: free
    databaseName: reportly
    user: reportly

services:
  - type: web
    name: reportly-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: reportly-db
          property: connectionString
      - key: ADMIN_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: NODE_VERSION
        value: "20"
    # Photos go to Cloudinary (set CLOUDINARY_URL above) so they survive
    # free-tier restarts. If left blank, photos save to local /uploads
    # and will be lost when the instance restarts.
