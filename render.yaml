databases:
  - name: reportly-db
    plan: free
    databaseName: reportly
    user: reportly

services:
  - type: web
    name: reportly-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: reportly-db
          property: connectionString
      - key: ADMIN_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: NODE_VERSION
        value: "20"
    # NOTE: To persist uploaded photos across restarts, upgrade this service
    # to a paid plan and add a `disk:` block mounted at server/uploads.
    # On the free plan, photos are lost when the instance restarts/sleeps.
